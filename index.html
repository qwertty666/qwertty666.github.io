    <!-- 猜数字小游戏 -->
<div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 20px; padding: 30px; margin: 40px 0; text-align: center; color: white;">
    <h2 style="margin-bottom: 15px;">🎮 猜数字小游戏</h2>
    <p>我已经想好了一个 1-100 之间的数字，你有 6 次机会猜中它！</p>
    
    <div style="margin: 20px 0;">
        <input type="number" id="guessInput" placeholder="输入你的猜测" style="width: 200px; padding: 12px; border-radius: 30px; border: none; text-align: center; font-size: 16px;">
        <button onclick="checkGuess()" style="margin-left: 10px; padding: 12px 25px; background: #ff6600; color: white; border: none; border-radius: 30px; cursor: pointer; font-size: 16px;">猜！</button>
    </div>
    
    <div id="gameMessage" style="margin: 15px 0; font-size: 18px; font-weight: bold;">✨ 输入数字开始游戏</div>
    <div id="attemptCount" style="margin: 10px 0; font-size: 14px; opacity: 0.8;"></div>
    
    <button onclick="resetGame()" style="padding: 8px 20px; background: rgba(255,255,255,0.2); color: white; border: 1px solid white; border-radius: 30px; cursor: pointer; margin-top: 10px;">🔄 新游戏</button>
</div>

<script>
// 游戏变量
let secretNumber = Math.floor(Math.random() * 100) + 1;
let attempts = 0;
let maxAttempts = 6;

// 初始化游戏显示
function updateDisplay() {
    document.getElementById('attemptCount').innerHTML = `📊 剩余机会：${maxAttempts - attempts} 次`;
}

// 猜数字逻辑
function checkGuess() {
    let input = document.getElementById('guessInput');
    let guess = parseInt(input.value);
    let message = document.getElementById('gameMessage');
    
    // 验证输入
    if (isNaN(guess) || guess < 1 || guess > 100) {
        message.innerHTML = '⚠️ 请输入 1-100 之间的数字！';
        message.style.color = '#ffcc00';
        return;
    }
    
    attempts++;
    
    if (guess === secretNumber) {
        message.innerHTML = '🎉 恭喜！猜对了！ 🎉';
        message.style.color = '#00ff00';
        message.style.fontSize = '22px';
        document.getElementById('guessInput').disabled = true;
        updateDisplay();
        return;
    } else if (guess < secretNumber) {
        message.innerHTML = `📈 ${guess} 太小了，再大一点！`;
        message.style.color = '#ffcc00';
    } else {
        message.innerHTML = `📉 ${guess} 太大了，再小一点！`;
        message.style.color = '#ffcc00';
    }
    
    // 检查是否用完机会
    if (attempts >= maxAttempts) {
        message.innerHTML = `😭 游戏结束！数字是 ${secretNumber}。点击"新游戏"继续挑战！`;
        message.style.color = '#ff9999';
        document.getElementById('guessInput').disabled = true;
    } else {
        updateDisplay();
        input.value = '';
        input.focus();
    }
}

// 重置游戏
function resetGame() {
    secretNumber = Math.floor(Math.random() * 100) + 1;
    attempts = 0;
    let input = document.getElementById('guessInput');
    input.disabled = false;
    input.value = '';
    document.getElementById('gameMessage').innerHTML = '✨ 新游戏开始！猜一个 1-100 之间的数字';
    document.getElementById('gameMessage').style.color = 'white';
    updateDisplay();
    input.focus();
}

// 页面加载时初始化
updateDisplay();
</script>
