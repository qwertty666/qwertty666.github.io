    <title>神秘图片 - 全球观察</title>
    <meta charset="utf-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
        }
        .nav {
            background-color: #333;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            padding: 8px 16px;
        }
        .nav a:hover {
            background-color: #555;
            border-radius: 5px;
        }
        h1 {
            color: #ffcc00;
            text-align: center;
            text-shadow: 2px 2px 4px #000;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 40px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            overflow: hidden;
            backdrop-filter: blur(5px);
            transition: transform 0.3s;
        }
        .card:hover {
            transform: scale(1.02);
        }
        .card img {
            width: 100%;
            height: auto;
            display: block;
        }
        .card p {
            padding: 15px;
            color: #ddd;
            text-align: center;
        }
        hr {
            margin: 40px 0;
            border-color: #444;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #ffcc00;
            text-decoration: none;
        }
        footer {
            text-align: center;
            color: #666;
            margin-top: 40px;
        }
    </style>
</head>
