<!DOCTYPE html>
<html>
   <script>

(function () {

    // ======================

    // SHA-256 加密函数

    // ======================

    async function sha256(message) {

        const msgBuffer = new TextEncoder().encode(message);

        const hashBuffer = await crypto.subtle.digest(

            "SHA-256",

            msgBuffer

        );

        const hashArray = Array.from(

            new Uint8Array(hashBuffer)

        );

        return hashArray

            .map(b => b.toString(16).padStart(2, "0"))

            .join("");

    }

    // ======================

    // 用户数据

    // 密码为 SHA-256

    // ======================

    const USERS = {

        "32": {

            password:

            "3d8a755f723c4ad9223f8dc17f81dbbe210b96c56bf69877540d3d7b772be13f",

            welcome:

            "欢迎！Fyh同学"

        },

        "33": {

            password:

            "3d8a755f723c4ad9223f8dc17f81dbbe210b96c56bf69877540d3d7b772be13f",

            welcome:

            "欢迎！Hxb同学"

        },

        "39": {

            password:

            "858055bd0be68b68e0bd74cac415184ee4e39631fb14c00e7094a348702ad23b",

            welcome:

            "欢迎！站长"

        }

    };

    const AUTH_KEY = "site_authenticated";

    const AUTH_USER_KEY = "site_username";

    function isAuthenticated(){

        return sessionStorage.getItem(AUTH_KEY)

        === "true";

    }

    function setAuthenticated(username){

        sessionStorage.setItem(

            AUTH_KEY,

            "true"

        );

        sessionStorage.setItem(

            AUTH_USER_KEY,

            username

        );

    }

    function getLoggedInUser(){

        return sessionStorage.getItem(

            AUTH_USER_KEY

        );

    }

    // ======================

    // 欢迎提示

    // ======================

    function showWelcomeMessage(username){

        const user = USERS[username];

        if(!user) return;

        const div=document.createElement("div");

        div.innerHTML=`

        <div style="

        position:fixed;

        top:20px;

        left:50%;

        transform:translateX(-50%);

        background:linear-gradient(135deg,#667eea,#764ba2);

        color:white;

        padding:15px 30px;

        border-radius:50px;

        font-size:18px;

        font-weight:bold;

        z-index:10000;

        box-shadow:0 4px 15px rgba(0,0,0,.3);

        animation:fadeInOut 3s ease forwards;

        ">

        ${user.welcome} 🎉

        </div>

        <style>

        @keyframes fadeInOut {

        0%{

        opacity:0;

        transform:

        translateX(-50%)

        translateY(-20px);

        }

        15%{

        opacity:1;

        transform:

        translateX(-50%)

        translateY(0);

        }

        85%{

        opacity:1;

        }

        100%{

        opacity:0;

        }

        }

        </style>

        `;

        document.body.appendChild(div);

        setTimeout(()=>{

            if(div.parentNode)

            div.remove();

        },3000);

    }

    // ======================

    // 登录窗口

    // ======================

    function showLoginDialog(){

        const overlay=document.createElement("div");

        overlay.id="login-overlay";

        overlay.style.cssText=`

        position:fixed;

        top:0;

        left:0;

        width:100%;

        height:100%;

        background:black;

        z-index:99999;

        display:flex;

        justify-content:center;

        align-items:center;

        font-family:Arial;

        `;

        overlay.innerHTML=`

        <div style="

        background:#1a1a1a;

        padding:40px;

        border-radius:15px;

        text-align:center;

        box-shadow:0 0 30px rgba(255,255,255,.1);

        ">

        <h2 style="color:white">

        🔐 验证身份

        </h2>

        <input id="login-username"

        placeholder="账号"

        style="

        width:250px;

        padding:12px;

        margin:10px;

        background:#2a2a2a;

        color:white;

        border:1px solid #444;

        border-radius:8px;

        text-align:center;

        ">

        <input id="login-password"

        type="password"

        placeholder="密码"

        style="

        width:250px;

        padding:12px;

        margin:10px;

        background:#2a2a2a;

        color:white;

        border:1px solid #444;

        border-radius:8px;

        text-align:center;

        ">

        <br>

        <button id="login-submit"

        style="

        background:#333;

        color:white;

        border:none;

        padding:12px 30px;

        border-radius:8px;

        cursor:pointer;

        ">

        登 录

        </button>

        </div>

        `;

        document.body.appendChild(overlay);

        const usernameInput =

        document.getElementById(

        "login-username"

        );

        const passwordInput =

        document.getElementById(

        "login-password"

        );

        const submitBtn =

        document.getElementById(

        "login-submit"

        );

        usernameInput.focus();

        async function doLogin(){

            const username =

            usernameInput.value.trim();

            const password =

            passwordInput.value;

            if(!USERS[username]){

                alert("❌账号或密码错误");

                return;

            }

            const passwordHash =

            await sha256(password);

            if(

            USERS[username].password

            === passwordHash

            ){

                setAuthenticated(username);

                overlay.remove();

                showWelcomeMessage(username);

            }else{

                alert("❌账号或密码错误");

                passwordInput.value="";

            }

        }

        submitBtn.onclick=doLogin;

        passwordInput.onkeypress=function(e){

            if(e.key==="Enter"){

                doLogin();

            }

        };

        usernameInput.onkeypress=function(e){

            if(e.key==="Enter"){

                passwordInput.focus();

            }

        };

    }

    // ======================

    // 退出登录

    // ======================

    window.logout=function(){

        sessionStorage.removeItem(

            AUTH_KEY

        );

        sessionStorage.removeItem(

            AUTH_USER_KEY

        );

        location.reload();

    };

    // ======================

    // 启动

    // ======================

    if(!isAuthenticated()){

        setTimeout(

            showLoginDialog,

            100

        );

    }else{

        setTimeout(()=>{

            const username =

            getLoggedInUser();

            if(username){

                showWelcomeMessage(username);

            }

        },500);

    }

})();

</script>
</head>
<body>

    <a href="/mystery.html" style="color: white;">神秘图片</a>

    <a href="/game.html" style="color: #ffcc00;">打地鼠</a>
</div>

<div class="game-container">
    <h1>打地鼠游戏，打中会变脸！</h1>
    <div class="score-board">
        <span>王茂钢特供版</span>
        <span>得分: <span id="score">0</span></span>
        <span>剩余: <span id="timer">30</span>秒</span>
    </div>
    
    <div class="grid" id="grid"></div>
    
    <div>
        <button onclick="startGame()">开始游戏</button>
        <button onclick="resetGame()">重置</button>
    </div>
    <p style="color: #ddd; margin-top: 15px;">点击冒出来的头像打地鼠！打中会变脸。</p>
</div>

<script>
    // ===== 替换成你上传的图片链接 =====
    const NORMAL_IMG = "https://cdn.jsdelivr.net/gh/qwertty666/qwertty666.github.io@main/CC4B146425F7DD0E59BE6EA1FEEB2470.png";
    const HIT_IMG = "https://cdn.jsdelivr.net/gh/qwertty666/qwertty666.github.io@main/1CC8CAAE38A7790104FED8DCB5A9D487.png";
    // =================================

    let score = 0;
    let timeLeft = 30;
    let gameActive = false;
    let gameInterval = null;
    let activeHoles = [];       // 当前地鼠所在的洞索引
    let holeElements = [];
    let moleTimeouts = [];      // 每个地鼠的自动消失定时器

    const grid = document.getElementById('grid');
    const scoreSpan = document.getElementById('score');
    const timerSpan = document.getElementById('timer');

    // 创建9个洞
    function createGrid() {
        grid.innerHTML = '';
        holeElements = [];
        for (let i = 0; i < 9; i++) {
            const hole = document.createElement('div');
            hole.className = 'hole';
            hole.dataset.index = i;
            
            const placeholder = document.createElement('div');
            placeholder.className = 'empty-placeholder';
            hole.appendChild(placeholder);
            
            hole.onclick = (e) => {
                e.stopPropagation();
                // 点空白可能扣分（可选，先不扣）
            };
            grid.appendChild(hole);
            holeElements.push(hole);
        }
    }

    // 清除所有地鼠
    function clearAllMoles() {
        for (let i = 0; i < activeHoles.length; i++) {
            const idx = activeHoles[i];
            const hole = holeElements[idx];
            if (hole) {
                const existingImg = hole.querySelector('.mole-img');
                if (existingImg) {
                    existingImg.classList.add('hide-down');
                    existingImg.classList.remove('show');
                    setTimeout(() => {
                        if (existingImg && existingImg.parentNode) {
                            existingImg.remove();
                            const newPlaceholder = document.createElement('div');
                            newPlaceholder.className = 'empty-placeholder';
                            if (hole.children.length === 0 || hole.children[0] !== newPlaceholder) {
                                hole.appendChild(newPlaceholder);
                            }
                        }
                    }, 100);
                }
            }
        }
        for (let t of moleTimeouts) clearTimeout(t);
        moleTimeouts = [];
        activeHoles = [];
    }

    // 移除指定洞的地鼠（缩回）
    function removeMoleFromHole(index, immediate = false) {
        const hole = holeElements[index];
        if (!hole) return;
        const img = hole.querySelector('.mole-img');
        if (img) {
            if (immediate) {
                img.remove();
                const placeholder = document.createElement('div');
                placeholder.className = 'empty-placeholder';
                if (hole.children.length === 0 || hole.children[0] !== placeholder) {
                    hole.appendChild(placeholder);
                }
            } else {
                img.classList.add('hide-down');
                img.classList.remove('show');
                setTimeout(() => {
                    if (img && img.parentNode) {
                        img.remove();
                        const placeholder = document.createElement('div');
                        placeholder.className = 'empty-placeholder';
                        if (hole.children.length === 0 || hole.children[0] !== placeholder) {
                            hole.appendChild(placeholder);
                        }
                    }
                }, 100);
            }
        }
        // 从活跃列表中移除
        const pos = activeHoles.indexOf(index);
        if (pos !== -1) activeHoles.splice(pos, 1);
    }

    // 在指定洞冒出地鼠
    function showMoleInHole(index) {
        if (!gameActive) return;
        if (activeHoles.includes(index)) return;
        
        const hole = holeElements[index];
        if (!hole) return;
        
        // 清除占位符
        const placeholder = hole.querySelector('.empty-placeholder');
        if (placeholder) placeholder.remove();
        
        // 创建地鼠图片
        const img = document.createElement('img');
        img.src = NORMAL_IMG;
        img.className = 'mole-img';
        img.onclick = (e) => {
            e.stopPropagation();
            hitMole(index, img);
        };
        hole.appendChild(img);
        
        // 强制重绘后触发动画
        setTimeout(() => {
            if (img && img.parentNode) {
                img.classList.add('show');
            }
        }, 5);
        
        activeHoles.push(index);
        
        // 设置自动消失（2秒后没被打就缩回）
        const timeout = setTimeout(() => {
            if (gameActive && activeHoles.includes(index)) {
                removeMoleFromHole(index);
            }
        }, 1400);
        moleTimeouts.push(timeout);
    }

    // 打中地鼠
    function hitMole(index, imgElement) {
        if (!gameActive) return;
        if (!activeHoles.includes(index)) return;
        
        // 加分
        score++;
        scoreSpan.innerText = score;
        
        // 切换成被打图片
        imgElement.src = HIT_IMG;
        
        // 取消自动消失定时器
        for (let i = 0; i < moleTimeouts.length; i++) {
            // 清除关联此洞的定时器（简单清所有，后面再重排）
        }
        // 清除对应定时器
        const newTimeouts = [];
        for (let t of moleTimeouts) {
            // 不清除，直接保留，但需要防止重复缩回
        }
        
        // 延迟缩回并消失
        setTimeout(() => {
            if (imgElement && imgElement.parentNode) {
                imgElement.classList.add('hide-down');
                imgElement.classList.remove('show');
                setTimeout(() => {
                    if (imgElement && imgElement.parentNode) {
                        imgElement.remove();
                        const placeholder = document.createElement('div');
                        placeholder.className = 'empty-placeholder';
                        const hole = holeElements[index];
                        if (hole && (hole.children.length === 0 || hole.children[0] !== placeholder)) {
                            hole.appendChild(placeholder);
                        }
                    }
                }, 100);
            }
            // 从活跃列表中移除
            const pos = activeHoles.indexOf(index);
            if (pos !== -1) activeHoles.splice(pos, 1);
        }, 150);
        
        // 被打后0.3秒内在另一个洞重新冒出来（保持压力）
        setTimeout(() => {
            if (gameActive) {
                let newIndex;
                do {
                    newIndex = Math.floor(Math.random() * 9);
                } while (activeHoles.includes(newIndex) && activeHoles.length < 9);
                if (!activeHoles.includes(newIndex)) {
                    showMoleInHole(newIndex);
                }
            }
        }, 350);
    }

    // 随机产生地鼠（每1秒左右出1只）
    let moleGenerator = null;
    function startMoleGenerator() {
        if (moleGenerator) clearInterval(moleGenerator);
        moleGenerator = setInterval(() => {
            if (!gameActive) return;
            // 控制最多同时出现3只
            if (activeHoles.length >= 1) return;
            let available = [];
            for (let i = 0; i < 9; i++) {
                if (!activeHoles.includes(i)) available.push(i);
            }
            if (available.length > 0) {
                const randomIndex = available[Math.floor(Math.random() * available.length)];
                showMoleInHole(randomIndex);
            }
        }, 900);
    }

    // 开始游戏
    function startGame() {
        if (gameActive) return;
        resetGame();
        gameActive = true;
        
        // 倒计时
        gameInterval = setInterval(() => {
            if (timeLeft <= 1) {
                endGame();
            } else {
                timeLeft--;
                timerSpan.innerText = timeLeft;
            }
        }, 1000);
        
        startMoleGenerator();
        
        // 开局立刻出几只活跃
        setTimeout(() => {
            for (let i = 0; i < 2; i++) {
                if (!gameActive) break;
                let available = [];
                for (let j = 0; j < 9; j++) {
                    if (!activeHoles.includes(j)) available.push(j);
                }
                if (available.length) {
                    showMoleInHole(available[Math.floor(Math.random() * available.length)]);
                }
            }
        }, 200);
    }
    
    // 结束游戏
    function endGame() {
        gameActive = false;
        if (gameInterval) clearInterval(gameInterval);
        if (moleGenerator) clearInterval(moleGenerator);
        moleGenerator = null;
        clearAllMoles();
        alert(`游戏结束！\n\n✨ 最终得分：${score} 分 ✨\n\n点击“开始游戏”继续挑战！`);
    }
    
    // 重置游戏
    function resetGame() {
        if (gameActive) {
            gameActive = false;
            if (gameInterval) clearInterval(gameInterval);
            if (moleGenerator) clearInterval(moleGenerator);
            moleGenerator = null;
        }
        clearAllMoles();
        score = 0;
        timeLeft = 30;
        scoreSpan.innerText = score;
        timerSpan.innerText = timeLeft;
        activeHoles = [];
        for (let t of moleTimeouts) clearTimeout(t);
        moleTimeouts = [];
        // 重建占位符
        for (let i = 0; i < holeElements.length; i++) {
            const hole = holeElements[i];
            const existingImg = hole.querySelector('.mole-img');
            if (existingImg) existingImg.remove();
            if (!hole.querySelector('.empty-placeholder')) {
                const placeholder = document.createElement('div');
                placeholder.className = 'empty-placeholder';
                hole.appendChild(placeholder);
            }
        }
    }

    createGrid();
</script>

</body>
